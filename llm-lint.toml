fail_threshold = 0
max_file_lines_warning = 400
max_file_lines_high = 800
max_function_lines_warning = 50
max_function_lines_high = 100
exclude_files = ["temp_slop_examples.py"]
exclude_severities = []

exclude_dirs = [
    ".git",
    "node_modules",
    ".nuxt",
    "dist",
    "build",
    ".venv",
    "coverage",
    "tests",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    ".venv-maturin"
]

include = [
    "fallback-defaults",
    "exposed-secrets",
    "large-function",
    "large-file",
    "duplicate-functions",
    "helper-sprawl",
]
